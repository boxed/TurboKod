[workspace]
name = "turbokod"
version = "0.1.0"
description = "A Mojo-idiomatic port of Turbo Vision."
channels = ["https://conda.modular.com/max", "conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
modular = ">=26.1"
oniguruma = ">=6.9.10,<7"

[tasks]
# All tasks route through run.sh so they share the .build/ cache and the
# build-time linker config. ``mojo run`` is JIT-only and silently ignores
# ``-Xlinker``, which is why we build instead.
hello    = "./run.sh examples/hello.mojo"
boxes    = "./run.sh examples/boxes.mojo"
desktop  = "./run.sh examples/desktop.mojo"
diagnose = "./run.sh examples/diagnose.mojo"
test     = "./run.sh tests/test_basic.mojo"
update-lsp-list = "python3 scripts/refresh_languages.py"
