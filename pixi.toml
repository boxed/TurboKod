[workspace]
name = "turbokod"
version = "0.1.0"
description = "A Mojo-idiomatic port of Turbo Vision."
channels = ["https://conda.modular.com/max", "conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
modular = ">=26.1"

[tasks]
hello    = "mojo run -I src examples/hello.mojo"
boxes    = "mojo run -I src examples/boxes.mojo"
desktop  = "mojo run -I src examples/desktop.mojo"
diagnose = "mojo run -I src examples/diagnose.mojo"
test     = "mojo run -I src tests/test_basic.mojo"
